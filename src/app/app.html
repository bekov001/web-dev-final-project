<!-- app.html -->
<div class="app-wrapper">
  <nav class="glass-nav">
    <div class="nav-brand">
      <a routerLink="/" class="logo">
        <span class="logo-kbtu">KBTU</span>
        <span class="logo-market">Marketplace</span>
      </a>
    </div>

    <div class="nav-links">
      <!-- Публичные ссылки -->
      <a routerLink="/products" routerLinkActive="active">Витрина</a>
      
      <!-- Ссылки для авторизованных пользователей -->
      @if (isLoggedIn()) {
        <a routerLink="/create" routerLinkActive="active">➕ Выставить</a>
        <a routerLink="/my-products" routerLinkActive="active">👤 Мой профиль</a>
        <button class="logout-btn" (click)="logout()">🚪 Выйти</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Войти</a>
        <a routerLink="/register" routerLinkActive="active">Регистрация</a>
      }
    </div>
  </nav>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
