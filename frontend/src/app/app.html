<div class="app-wrapper">
  <nav class="glass-nav">
    <div class="nav-brand">
      <a routerLink="/" class="logo">
        <span class="logo-poly">KBTU</span><span class="logo-predict">Predict</span>
      </a>
    </div>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Markets</a>
      <a routerLink="/create" routerLinkActive="active" class="create-btn">+ Create</a>

      @if (auth.user$ | async; as user) {
        <div class="user-info">
          <span class="points-badge">{{ user.points }} pts</span>
          <span class="username">{{ user.username }}</span>
          <a class="logout-btn" (click)="logout()">Logout</a>
        </div>
      } @else {
        <a routerLink="/auth" routerLinkActive="active" class="login-btn">Sign In</a>
      }
    </div>
  </nav>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
