<div class="auth-container">
  <div class="auth-card">
    <h1>{{ isLogin ? 'Sign In' : 'Sign Up' }}</h1>
    <p class="subtitle">{{ isLogin ? 'Welcome back to KBTUPredict' : 'Create your account and get 100 points' }}</p>

    @if (errorMessage) {
      <div class="error-banner">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="field">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Enter username" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Loading...' : (isLogin ? 'Sign In' : 'Sign Up') }}
      </button>
    </form>

    <p class="toggle">
      {{ isLogin ? "Don't have an account?" : 'Already have an account?' }}
      <a (click)="toggleMode()">{{ isLogin ? 'Sign Up' : 'Sign In' }}</a>
    </p>
  </div>
</div>
