<div class="login-container">
  <a routerLink="/" class="back-link">&larr; Back to markets</a>
  <div class="login-card">
    <h1>Moderator Login</h1>
    <p class="subtitle">Sign in with your local Django account.</p>

    @if (errorMessage) {
      <div class="error-banner">{{ errorMessage }}</div>
    }

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" type="text" class="form-input" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" class="form-input" />
    </div>

    <button class="btn-login" (click)="doLogin()">Login</button>
  </div>
</div>
